<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380">
  <style>
    .t { font-family: 'Courier New', monospace; font-size: 13px; fill: #c9d1d9; }
    .prompt { fill: #58a6ff; }
    .cmd { fill: #f0f6fc; font-weight: bold; }
    .green { fill: #3fb950; }
    .yellow { fill: #d29922; }
    .cow { fill: #8b949e; }

    .line { opacity: 0; animation: appear 0.01s forwards; }
    .l1  { animation-delay: 0s; }
    .l2  { animation-delay: 0.6s; }
    .l3  { animation-delay: 1.0s; }
    .l4  { animation-delay: 1.8s; }
    .l5  { animation-delay: 2.2s; }
    .l6  { animation-delay: 3.2s; }
    .l7  { animation-delay: 3.6s; }
    .l8  { animation-delay: 3.9s; }
    .l9  { animation-delay: 4.2s; }
    .l10 { animation-delay: 4.5s; }
    .l11 { animation-delay: 4.8s; }
    .l12 { animation-delay: 5.1s; }
    .l13 { animation-delay: 5.4s; }
    .l14 { animation-delay: 5.7s; }
    .l15 { animation-delay: 6.0s; }

    .cursor { animation: blink 1s step-end infinite; animation-delay: 6.0s; opacity: 0; }

    @keyframes appear { to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>

  <g transform="translate(10, 16)">
