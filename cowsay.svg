    <text y="20"  class="t line l2">Calculating dependencies... done!</text>
    <text y="40"  class="t line l3">[<tspan class="green">ebuild&#160;&#160;N</tspan>&#160;&#160;&#160;&#160;]&#160;app-misc/cowsay-3.04-r2&#160;&#160;USE="<tspan class="yellow">unicode</tspan>"</text>
    <text y="68"  class="t line l4"><tspan class="green">&gt;&gt;&gt;</tspan>&#160;Installing app-misc/cowsay-3.04-r2</text>
    <text y="88"  class="t line l5"><tspan class="green">&gt;&gt;&gt;</tspan>&#160;Completed installing app-misc/cowsay-3.04-r2</text>

    <text y="120" class="t line l6"><tspan class="prompt">dima@nas ~ $</tspan>&#160;<tspan class="cmd">cowsay "Hello, I'm Dima! Welcome to my Github"</tspan></text>
    <text y="140" class="t line l7">&#160;_______________________________________</text>
    <text y="160" class="t line l8">&lt;&#160;Hello, I'm Dima! Welcome to my Github&#160;&gt;</text>
